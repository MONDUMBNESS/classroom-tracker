<!DOCTYPE html>
<html lang="th" class="h-full bg-slate-50 dark:bg-slate-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Task Tracker - ระบบติดตามงาน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 500: '#0284c7' } } } } }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="h-full text-slate-800 dark:text-slate-100">

    <div class="min-h-full flex flex-col">
        <header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 h-16 flex items-center px-6 shadow-sm">
            <h1 class="font-bold text-xl text-primary-500">Classroom Tracker</h1>
        </header>

        <main class="flex-1 max-w-7xl w-full mx-auto p-6">
            <div id="toastContainer" class="fixed top-20 right-4 z-50 flex flex-col gap-2"></div>

            <div id="landingView" class="max-w-md mx-auto bg-white dark:bg-slate-800 p-8 rounded-2xl border shadow-xl text-center">
                <i class="fa-solid fa-graduation-cap text-5xl text-primary-500 mb-6 animate-pulse"></i>
                <h1 class="text-2xl font-bold mb-4">ยินดีต้อนรับสู่ระบบติดตามงาน</h1>
                <p class="text-slate-500 mb-6">กดปุ่มด้านล่างเพื่อเริ่มการทดสอบระบบและดูตัวอย่างงาน</p>
                <button onclick="enterDemoMode()" class="w-full bg-primary-500 text-white font-semibold py-3 rounded-xl hover:bg-primary-600 transition shadow-lg shadow-blue-500/30">เข้าสู่ Dashboard</button>
            </div>

            <div id="mainDashboardView" class="hidden space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl border shadow-sm">
                        <p class="text-sm text-slate-500">งานที่ต้องส่ง</p>
                        <p id="statPendingCount" class="text-3xl font-bold text-primary-500">0</p>
                    </div>
                </div>
                
                <div class="bg-white dark:bg-slate-800 rounded-2xl border shadow-sm p-6">
                    <h2 class="font-bold text-lg mb-4">รายการงานล่าสุด</h2>
                    <div id="tasksContainer" class="space-y-3">
                        <!-- Tasks will be injected here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const state = { 
            tasks: [
                { id: 1, title: "รายงานวิชาประวัติศาสตร์", class: "ม.5/1", deadline: "3 ก.ค. 2566", status: "pending" },
                { id: 2, title: "โจทย์เลข 10 ข้อ", class: "ม.5/1", deadline: "5 ก.ค. 2566", status: "pending" },
                { id: 3, title: "แบบฝึกหัดภาษาอังกฤษ", class: "ม.5/1", deadline: "1 ก.ค. 2566", status: "completed" }
            ] 
        };

        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-lg bg-slate-800 text-white border border-slate-700`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function enterDemoMode() {
            document.getElementById('landingView').classList.add('hidden');
            document.getElementById('mainDashboardView').classList.remove('hidden');
            renderTasks();
            showToast("โหลดข้อมูลสำเร็จ");
        }

        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            const pendingTasks = state.tasks.filter(t => t.status === 'pending');
            
            document.getElementById('statPendingCount').textContent = pendingTasks.length;

            container.innerHTML = state.tasks.map(task => `
                <div class="flex items-center justify-between p-4 border rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition">
                    <div>
                        <h3 class="font-semibold">${task.title}</h3>
                        <p class="text-sm text-slate-500">${task.class} • กำหนดส่ง: ${task.deadline}</p>
                    </div>
                    <span class="px-3 py-1 rounded-full text-xs font-medium ${task.status === 'pending' ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}">
                        ${task.status === 'pending' ? 'รอดำเนินการ' : 'ส่งแล้ว'}
                    </span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
