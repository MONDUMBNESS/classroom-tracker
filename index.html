<!DOCTYPE html>
<html lang="th" class="h-full bg-slate-50 dark:bg-slate-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Task Tracker - ระบบติดตามงาน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0284c7', 600: '#0369a1', 700: '#075985' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="h-full text-slate-800 dark:text-slate-100 transition-colors duration-200">

    <div id="toastContainer" class="fixed top-20 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <div class="min-h-full flex flex-col">
        <header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 h-16 flex items-center px-6 sticky top-0 z-40">
            <div class="max-w-7xl w-full mx-auto flex justify-between items-center">
                <h1 class="font-bold text-xl text-primary-500">Classroom Tracker</h1>
                <div class="flex items-center gap-4">
                    <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
                        <i class="fa-solid fa-moon dark:hidden"></i>
                        <i class="fa-solid fa-sun hidden dark:inline"></i>
                    </button>
                    <div id="userInfo" class="hidden flex items-center gap-3">
                        <span class="text-sm font-semibold">สมชาย ใจดี</span>
                        <button onclick="handleSignOut()" class="text-rose-500"><i class="fa-solid fa-right-from-bracket"></i></button>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-7xl w-full mx-auto p-6">
            <div id="landingView" class="max-w-md mx-auto bg-white dark:bg-slate-800 p-8 rounded-2xl border shadow-xl text-center">
                <i class="fa-solid fa-graduation-cap text-5xl text-primary-500 mb-6 animate-pulse"></i>
                <h1 class="text-2xl font-bold mb-4">ยินดีต้อนรับสู่ระบบ</h1>
                <p class="text-slate-500 mb-6">จัดการงานค้างและแจ้งเตือนอย่างเป็นระเบียบ</p>
                <button onclick="enterDemoMode()" class="w-full bg-primary-500 text-white font-semibold py-3 rounded-xl hover:bg-primary-600 transition">เข้าสู่ Dashboard</button>
            </div>

            <div id="mainDashboardView" class="hidden space-y-6">
                <div class="flex gap-4 border-b border-slate-200 dark:border-slate-700">
                    <button onclick="switchTab('overview')" id="tab-overview" class="py-4 px-2 border-b-2 border-primary-500 text-primary-600 font-medium text-sm">ภาพรวม</button>
                    <button onclick="switchTab('settings')" id="tab-settings" class="py-4 px-2 border-b-2 border-transparent text-slate-500 hover:text-slate-700 font-medium text-sm">การตั้งค่า</button>
                </div>

                <div id="section-overview">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl border shadow-sm">
                            <p class="text-sm text-slate-500">งานค้างทั้งหมด</p>
                            <p id="statPendingCount" class="text-3xl font-bold text-primary-500">0</p>
                        </div>
                    </div>
                    
                    <div class="bg-white dark:bg-slate-800 rounded-2xl border shadow-sm p-6">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="font-bold text-lg">รายการงานล่าสุด</h2>
                            <button onclick="openCustomTaskModal()" class="bg-slate-100 dark:bg-slate-700 px-4 py-2 rounded-lg text-sm font-semibold">+ เพิ่มงาน</button>
                        </div>
                        <div id="tasksContainer" class="space-y-3"></div>
                    </div>
                </div>

                <div id="section-settings" class="hidden">
                    <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl border shadow-sm">
                        <h3 class="font-bold mb-4">การตั้งค่า API</h3>
                        <div class="space-y-3">
                            <input id="gClientId" placeholder="Google Client ID" class="w-full p-2 border rounded-lg dark:bg-slate-900">
                            <input id="gApiKey" placeholder="Google API Key" class="w-full p-2 border rounded-lg dark:bg-slate-900">
                            <button onclick="saveApiCredentials()" class="bg-primary-500 text-white px-4 py-2 rounded-lg">บันทึก</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="customTaskModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50">
        <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl max-w-sm w-full">
            <h3 class="font-bold mb-4">เพิ่มงานใหม่</h3>
            <form onsubmit="handleCustomTaskSubmit(event)" class="space-y-4">
                <input id="taskTitle" required placeholder="ชื่องาน" class="w-full p-2 border rounded-lg dark:bg-slate-900">
                <input id="taskDueDate" type="datetime-local" required class="w-full p-2 border rounded-lg dark:bg-slate-900">
                <div class="flex justify-end gap-2">
                    <button type="button" onclick="closeCustomTaskModal()" class="px-4 py-2 bg-slate-100 rounded-lg">ยกเลิก</button>
                    <button type="submit" class="px-4 py-2 bg-primary-500 text-white rounded-lg">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const state = { 
            tasks: [
                { id: 1, title: "รายงานวิชาประวัติศาสตร์", class: "ม.5/1", deadline: "3 ก.ค. 2566", status: "pending" },
                { id: 2, title: "โจทย์เลข 10 ข้อ", class: "ม.5/1", deadline: "5 ก.ค. 2566", status: "pending" }
            ] 
        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-lg bg-slate-800 text-white border border-slate-700 pointer-events-auto transition-all`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }

        function enterDemoMode() {
            document.getElementById('landingView').classList.add('hidden');
            document.getElementById('mainDashboardView').classList.remove('hidden');
            document.getElementById('userInfo').classList.remove('hidden');
            renderTasks();
            showToast("โหลดข้อมูลสำเร็จ");
        }

        function switchTab(tab) {
            document.getElementById('section-overview').classList.toggle('hidden', tab !== 'overview');
            document.getElementById('section-settings').classList.toggle('hidden', tab !== 'settings');
        }

        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            const pendingTasks = state.tasks.filter(t => t.status === 'pending');
            document.getElementById('statPendingCount').textContent = pendingTasks.length;
            container.innerHTML = state.tasks.map(task => `
                <div class="flex items-center justify-between p-4 border rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition">
                    <div>
                        <h3 class="font-semibold">${task.title}</h3>
                        <p class="text-sm text-slate-500">กำหนดส่ง: ${task.deadline}</p>
                    </div>
                    <span class="px-3 py-1 rounded-full text-xs font-medium ${task.status === 'pending' ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}">
                        ${task.status === 'pending' ? 'รอทำ' : 'เสร็จแล้ว'}
                    </span>
                </div>
            `).join('');
        }

        function openCustomTaskModal() { document.getElementById('customTaskModal').classList.remove('hidden'); }
        function closeCustomTaskModal() { document.getElementById('customTaskModal').classList.add('hidden'); }
        function handleCustomTaskSubmit(e) {
            e.preventDefault();
            showToast("บันทึกงานใหม่สำเร็จ");
            closeCustomTaskModal();
        }
        function handleSignOut() { location.reload(); }
        function saveApiCredentials() { showToast("บันทึกการตั้งค่าแล้ว"); }
    </script>
</body>
</html>
